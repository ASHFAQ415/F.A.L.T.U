events {
    worker_connections 1024;
}

http {
    # ─────────────────────────────────────────
    # Basic Settings
    # ─────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    types_hash_max_size 2048;
    client_max_body_size 50M;    # Allow up to 50MB document uploads

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─────────────────────────────────────────
    # Gzip Compression (speeds up page loads)
    # ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ─────────────────────────────────────────
    # Security Headers
    # ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ─────────────────────────────────────────
    # Upstream Services
    # ─────────────────────────────────────────
    upstream streamlit {
        server frontend:8501;
    }

    upstream fastapi {
        server backend:8000;
    }

    # ─────────────────────────────────────────
    # Main Server — Port 80
    # Routes:
    #   /api/*        → FastAPI backend
    #   /_stcore/*    → Streamlit internals (WebSocket)
    #   /stream       → Streamlit WebSocket
    #   /*            → Streamlit frontend
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;    # Matches any hostname or IP address

        # ── FastAPI Backend ──────────────────
        location /api/ {
            proxy_pass         http://fastapi/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Needed for Server-Sent Events (streaming chat responses)
            proxy_buffering       off;
            proxy_cache           off;
            proxy_read_timeout    300s;
            proxy_connect_timeout 75s;
            chunked_transfer_encoding on;
        }

        # ── Streamlit WebSocket (required for live updates) ──
        location /_stcore/stream {
            proxy_pass         http://streamlit/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400;    # Keep WebSocket alive for 24h
        }

        # ── Streamlit Static Assets ──────────
        location /_stcore/ {
            proxy_pass         http://streamlit/_stcore/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Streamlit Main App ───────────────
        location / {
            proxy_pass         http://streamlit/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}
