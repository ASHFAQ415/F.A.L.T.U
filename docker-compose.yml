version: "3.9"

# ============================================================
#  Enterprise RAG Chatbot — Docker Compose Stack
#  Local development: docker compose up
#  Production: Deploy to Railway (see README.md)
# ============================================================

services:

  # ──────────────────────────────────────────────
  # Backend — FastAPI orchestrator
  # Handles: auth, retrieval, LLM calls, ingestion
  # LLM: Groq API (free, external) — no Ollama needed
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - rag_data:/app/data          # ChromaDB + uploaded docs
      - ./backend:/app              # Hot reload in development
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - CHROMA_DATA_DIR=/app/data/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 60s             # Allow time for sentence-transformers model download

  # ──────────────────────────────────────────────
  # Frontend — Streamlit chat UI
  # Beautiful chat interface, no React/Node needed
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
    volumes:
      - ./frontend:/app             # Hot reload in development

  # ──────────────────────────────────────────────
  # Nginx — Reverse proxy + serves on port 80
  # Routes: / → Streamlit, /api → FastAPI
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rag_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────
  # Prometheus — Metrics collection (FREE)
  # Scrapes backend /metrics endpoint
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: rag_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ──────────────────────────────────────────────
  # Grafana — Beautiful monitoring dashboards (FREE)
  # Access at http://localhost:3000 (admin / set in .env)
  # Dashboard auto-provisioned: RAG Chatbot API metrics
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: rag_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://%(domain)s:3000/

# ──────────────────────────────────────────────
# Named volumes — persisted across restarts
# ──────────────────────────────────────────────
volumes:
  rag_data:         # ChromaDB vectors + uploaded docs
  prometheus_data:  # Prometheus time-series metrics
  grafana_data:     # Grafana dashboards and settings
  nginx_logs:       # Nginx access/error logs
