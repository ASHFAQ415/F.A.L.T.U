version: "3.9"

# ============================================================
#  Free Enterprise RAG Chatbot — Docker Compose Stack
#  All services run 100% free on Oracle Cloud Always Free tier
#  No subscriptions. No API keys. No monthly bills.
# ============================================================

services:

  # ──────────────────────────────────────────────
  # Ollama — runs LLM + embeddings locally (FREE)
  # Models: llama3.1:8b (chat) + nomic-embed-text (embeddings)
  # ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # Persist downloaded models
    environment:
      - OLLAMA_KEEP_ALIVE=24h       # Keep models loaded in RAM
      - OLLAMA_NUM_PARALLEL=2       # Handle 2 concurrent requests
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s             # Give time for model downloads

  # ──────────────────────────────────────────────
  # Model Puller — downloads models on first start
  # Runs once, then exits (one-shot service)
  # ──────────────────────────────────────────────
  model-puller:
    image: ollama/ollama:latest
    container_name: rag_model_puller
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "📥 Pulling LLM model: llama3.1:8b ..."
        ollama pull llama3.1:8b
        echo "📥 Pulling embedding model: nomic-embed-text ..."
        ollama pull nomic-embed-text
        echo "📥 Pulling reranker model: cross-encoder support ..."
        echo "✅ All models ready!"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ──────────────────────────────────────────────
  # Backend — FastAPI orchestrator
  # Handles: auth, retrieval, LLM calls, ingestion
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - rag_data:/app/data          # ChromaDB + SQLite + uploaded docs
      - ./backend:/app              # Hot reload in development
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────
  # Frontend — Streamlit chat UI
  # Beautiful chat interface, no React/Node needed
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
    volumes:
      - ./frontend:/app             # Hot reload in development

  # ──────────────────────────────────────────────
  # Nginx — Reverse proxy + serves on port 80
  # Routes: / → Streamlit, /api → FastAPI
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rag_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────
  # Prometheus — Metrics collection (FREE)
  # Scrapes backend /metrics endpoint
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: rag_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ──────────────────────────────────────────────
  # Grafana — Beautiful monitoring dashboards (FREE)
  # Access at http://<your-ip>:3000 (admin/admin)
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: rag_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://%(domain)s:3000/

# ──────────────────────────────────────────────
# Named volumes — persisted across restarts
# ──────────────────────────────────────────────
volumes:
  ollama_data:      # Ollama model weights (~8GB for llama3.1:8b)
  rag_data:         # ChromaDB vectors + SQLite database + uploaded docs
  prometheus_data:  # Prometheus time-series metrics
  grafana_data:     # Grafana dashboards and settings
  nginx_logs:       # Nginx access/error logs
